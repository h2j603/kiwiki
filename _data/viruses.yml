# Virus index data — consumed by content/index.md to render the phylogeny tree.
#
# Fields:
#   id         — file basename (matches content/viruses/<id>.md)
#   code       — classification code, format WKV-<type>.<vector>-<num>
#   file       — url path used by the index links (paired with the
#                permalink default in _config.yml that serves virus pages
#                at /viruses/:basename.html)
#   type       — single-letter type key: "0"=primordial, "L"=Logic,
#                "S"=Sensory, "C"=Cognitive, "E"=Environmental
#   severity   — moderate | high | critical | unknown (drives the
#                typographic treatment on the index, not a pill)
#   primordial — true only for KiwiZero (the origin strain)
#   en / ko / ja — per-language display name (goes inside ✢ ✢ glyphs)

- id: kiwizero
  code: WKV-0.ALL-000
  file: viruses/kiwizero.html
  type: "0"
  severity: unknown
  primordial: true
  en: KiwiZero
  ko: 키위제로
  ja: キウイゼロ

