title: Kiwiki
description: "Web Kiwi Virus Wiki"
theme: just-the-docs
baseurl: "/kiwiki"

color_scheme: kiwiki

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

exclude:
  - config/
  - data/
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - content/viruses/_template.md

search_enabled: false
heading_anchor: false
nav_sort: case_insensitive

# No footer
footer_content: ""

# No back to top
back_to_top: false

# Sidebar hidden via CSS (keep nav_enabled so .main-content exists)

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
