name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Debug - check kiwiki.js
        run: |
          echo "=== kiwiki.js exists? ==="
          ls -la _site/assets/js/kiwiki.js || echo "NOT FOUND"
          echo "=== kiwiki.js size ==="
          wc -c _site/assets/js/kiwiki.js || echo "N/A"
          echo "=== kiwiki.js first 5 lines ==="
          head -5 _site/assets/js/kiwiki.js || echo "N/A"
          echo "=== script src in index.html ==="
          grep -o 'src="[^"]*kiwiki[^"]*"' _site/index.html || echo "NOT FOUND"
          echo "=== virus interactions count ==="
          grep -c "echoloop\|deadscroll\|mirrorlink" _site/assets/js/kiwiki.js || echo "0"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
