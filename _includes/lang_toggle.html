<div class="lang-toggle" id="kiwiki-lang-toggle">
  <button class="lang-btn active" data-lang="en" onclick="kiwikiSetLang('en')">EN</button>
  <button class="lang-btn" data-lang="ko" onclick="kiwikiSetLang('ko')">한국어</button>
  <button class="lang-btn" data-lang="ja" onclick="kiwikiSetLang('ja')">日本語</button>
</div>

<script>
// ====== LANGUAGE (independent, no dependencies) ======
function kiwikiSetLang(l) {
  try {
    document.body.className = document.body.className.replace(/lang-\w+/g, '') + ' lang-' + l;
    var btns = document.getElementById('kiwiki-lang-toggle');
    if (btns) {
      var bs = btns.getElementsByTagName('button');
      for (var i = 0; i < bs.length; i++) {
        if (bs[i].getAttribute('data-lang') === l) { bs[i].className = 'lang-btn active'; }
        else { bs[i].className = 'lang-btn'; }
      }
    }
    localStorage.setItem('kiwiki-lang', l);
  } catch(e) {}
  // rebuild TOC after lang change
  try { kiwikiToc(); } catch(e) {}
}
// restore saved language
try {
  var _sl = localStorage.getItem('kiwiki-lang');
  if (_sl && _sl !== 'en') { kiwikiSetLang(_sl); }
  else { document.body.className += ' lang-en'; }
} catch(e) {
  document.body.className += ' lang-en';
}
</script>

<script>
// ====== TOC (independent) ======
function kiwikiToc() {
  try {
    var toc = document.getElementById('kiwiki-toc');
    if (!toc) return;
    toc.innerHTML = '';
    var all = document.getElementsByTagName('h2');
    var items = [];
    for (var i = 0; i < all.length; i++) {
      try {
        if (window.getComputedStyle(all[i]).display === 'none') continue;
      } catch(e) { continue; }
      items.push(all[i]);
    }
    if (items.length < 2) return;
    var ol = document.createElement('ol');
    ol.style.cssText = 'list-style:none;padding:0;margin:0;';
    for (var j = 0; j < items.length; j++) {
      var h = items[j];
      var num = j + 1;
      if (!h.id) h.id = 'sec-' + num;
      // number prefix on heading
      var sn = h.querySelector('.sec-num');
      if (!sn) { sn = document.createElement('span'); sn.className = 'sec-num'; h.insertBefore(sn, h.firstChild); }
      sn.textContent = num + '. ';
      // toc link text (exclude .sec-num and .anchor-heading)
      var txt = '';
      for (var c = 0; c < h.childNodes.length; c++) {
        var cn = h.childNodes[c];
        if (cn.nodeType === 1 && (cn.className === 'sec-num' || cn.className === 'anchor-heading')) continue;
        txt += cn.textContent || '';
      }
      txt = txt.replace(/#/g, '').trim();
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = num + '. ' + txt;
      li.appendChild(a);
      ol.appendChild(li);
    }
    toc.appendChild(ol);
  } catch(e) {}
}
</script>

<script>
// ====== INFECTION (independent) ======
try {
  var _viruses = ['echoloop','mirrorlink','pixelrot','deadscroll','glitchmoss','nullwhisper','blindspot','phantomtab','staticbloom','syntaxwraith','cachevein','forgetmenot'];
  var _vnames = {echoloop:'EchoLoop',mirrorlink:'MirrorLink',pixelrot:'PixelRot',deadscroll:'DeadScroll',glitchmoss:'GlitchMoss',nullwhisper:'NullWhisper',blindspot:'BlindSpot',phantomtab:'PhantomTab',staticbloom:'StaticBloom',syntaxwraith:'SyntaxWraith',cachevein:'CacheVein',forgetmenot:'ForgetMeNot'};
  var _vcodes = {echoloop:'WKV-C.SE-001',mirrorlink:'WKV-S.SN-001',pixelrot:'WKV-S.EM-002',deadscroll:'WKV-C.SN-002',glitchmoss:'WKV-E.DA-001',nullwhisper:'WKV-L.MS-001',blindspot:'WKV-S.SE-004',phantomtab:'WKV-L.SN-003',staticbloom:'WKV-E.SN-003',syntaxwraith:'WKV-L.DA-002',cachevein:'WKV-E.MS-002',forgetmenot:'WKV-C.EM-003'};
  var _vid = sessionStorage.getItem('kiwiki-virus');
  if (!_vid) { _vid = _viruses[Math.floor(Math.random() * _viruses.length)]; sessionStorage.setItem('kiwiki-virus', _vid); }
  document.body.classList.add('virus-' + _vid);
  // infection notice (after DOM ready)
  function _showInfection() {
    var bar = document.createElement('div');
    bar.className = 'infection-notice';
    bar.innerHTML = '⚠ infected: <b>' + (_vnames[_vid]||_vid) + '</b> (' + (_vcodes[_vid]||'') + ')';
    document.body.appendChild(bar);
    setTimeout(function(){ bar.style.transition='opacity 1s'; bar.style.opacity='0'; }, 8000);
  }
} catch(e) {}
</script>

<script>
// ====== ON DOM READY: TOC + infection notice ======
function _kiwikiReady() {
  try { kiwikiToc(); } catch(e) {}
  try { _showInfection(); } catch(e) {}
  // DeadScroll effect
  try {
    if (sessionStorage.getItem('kiwiki-virus') === 'deadscroll') {
      var _sc = 0;
      window.addEventListener('scroll', function() { if (++_sc % 60 === 0) window.scrollBy(0, Math.random()*150-75); });
    }
  } catch(e) {}
  // EchoLoop effect
  try {
    if (sessionStorage.getItem('kiwiki-virus') === 'echoloop') {
      setTimeout(function(){
        var ps = document.querySelectorAll('main p, .main-content p');
        if (ps.length > 3) { var p = ps[Math.floor(Math.random()*ps.length)]; var cl = p.cloneNode(true); cl.style.opacity='0.12'; cl.style.fontStyle='italic'; p.parentNode.insertBefore(cl, p.nextSibling); }
      }, 20000);
    }
  } catch(e) {}
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(_kiwikiReady, 300); });
} else {
  setTimeout(_kiwikiReady, 300);
}
</script>
