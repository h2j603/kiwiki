<div class="lang-toggle" id="kiwiki-lang-toggle">
  <button class="lang-btn active" data-lang="en" onclick="kiwikiLang('en')">EN</button>
  <button class="lang-btn" data-lang="ko" onclick="kiwikiLang('ko')">한국어</button>
  <button class="lang-btn" data-lang="ja" onclick="kiwikiLang('ja')">日本語</button>
</div>
<script>
// === 1. Language (runs immediately) ===
function kiwikiLang(l){
  document.body.className=document.body.className.replace(/lang-\w+/g,'')+' lang-'+l;
  var b=document.getElementById('kiwiki-lang-toggle').getElementsByTagName('button');
  for(var i=0;i<b.length;i++) b[i].className='lang-btn'+(b[i].getAttribute('data-lang')===l?' active':'');
  try{localStorage.setItem('kiwiki-lang',l);}catch(e){}
  setTimeout(kiwikiBuildToc,100);
}
// Apply saved language NOW
(function(){
  var s='en';
  try{s=localStorage.getItem('kiwiki-lang')||'en';}catch(e){}
  document.body.className+=' lang-'+s;
  if(s!=='en'){
    var b=document.getElementById('kiwiki-lang-toggle').getElementsByTagName('button');
    for(var i=0;i<b.length;i++) b[i].className='lang-btn'+(b[i].getAttribute('data-lang')===s?' active':'');
  }
})();

// === 2. TOC builder ===
function kiwikiBuildToc(){
  var toc=document.getElementById('kiwiki-toc');
  if(!toc)return;
  toc.innerHTML='';
  var hs=document.getElementsByTagName('h2');
  var ol=document.createElement('ol');
  ol.style.cssText='list-style:none;padding:0;margin:0;';
  var n=0;
  for(var i=0;i<hs.length;i++){
    var h=hs[i];
    try{if(window.getComputedStyle(h).display==='none')continue;}catch(e){continue;}
    n++;
    if(!h.id)h.id='s'+n;
    var sn=h.querySelector('.sec-num');
    if(!sn){sn=document.createElement('span');sn.className='sec-num';h.insertBefore(sn,h.firstChild);}
    sn.textContent=n+'. ';
    var txt='';
    for(var c=0;c<h.childNodes.length;c++){
      var nd=h.childNodes[c];
      if(nd.className==='sec-num'||nd.className==='anchor-heading')continue;
      txt+=nd.textContent;
    }
    var li=document.createElement('li');
    var a=document.createElement('a');
    a.href='#'+h.id;
    a.textContent=n+'. '+txt.replace(/#/g,'').trim();
    li.appendChild(a);
    ol.appendChild(li);
  }
  if(n>0)toc.appendChild(ol);
}

// === 3. Infection + TOC (after full DOM load) ===
function kiwikiOnReady(fn){
  if(document.readyState!=='loading')fn();
  else document.addEventListener('DOMContentLoaded',fn);
}
kiwikiOnReady(function(){
  // TOC
  setTimeout(kiwikiBuildToc,300);

  // Random virus infection
  var viruses=[
    'echoloop','mirrorlink','pixelrot','deadscroll','glitchmoss',
    'nullwhisper','blindspot','phantomtab','staticbloom',
    'syntaxwraith','cachevein','forgetmenot'
  ];
  var names={
    echoloop:'EchoLoop',mirrorlink:'MirrorLink',pixelrot:'PixelRot',
    deadscroll:'DeadScroll',glitchmoss:'GlitchMoss',nullwhisper:'NullWhisper',
    blindspot:'BlindSpot',phantomtab:'PhantomTab',staticbloom:'StaticBloom',
    syntaxwraith:'SyntaxWraith',cachevein:'CacheVein',forgetmenot:'ForgetMeNot'
  };
  var codes={
    echoloop:'WKV-C.SE-001',mirrorlink:'WKV-S.SN-001',pixelrot:'WKV-S.EM-002',
    deadscroll:'WKV-C.SN-002',glitchmoss:'WKV-E.DA-001',nullwhisper:'WKV-L.MS-001',
    blindspot:'WKV-S.SE-004',phantomtab:'WKV-L.SN-003',staticbloom:'WKV-E.SN-003',
    syntaxwraith:'WKV-L.DA-002',cachevein:'WKV-E.MS-002',forgetmenot:'WKV-C.EM-003'
  };

  var vid;
  try{vid=sessionStorage.getItem('kiwiki-virus');}catch(e){}
  if(!vid||viruses.indexOf(vid)<0){
    vid=viruses[Math.floor(Math.random()*viruses.length)];
    try{sessionStorage.setItem('kiwiki-virus',vid);}catch(e){}
  }

  // Add virus class to body (preserve existing classes)
  document.body.classList.add('virus-'+vid);

  // JS-based effects
  if(vid==='echoloop'){
    setTimeout(function(){
      var ps=document.querySelectorAll('main p, .main-content p');
      if(ps.length>3){
        var p=ps[Math.floor(Math.random()*ps.length)];
        var c=p.cloneNode(true);c.style.opacity='0.12';c.style.fontStyle='italic';
        p.parentNode.insertBefore(c,p.nextSibling);
      }
    },20000);
  }
  if(vid==='deadscroll'){
    var sc=0;
    window.addEventListener('scroll',function(){
      if(++sc%60===0)window.scrollBy(0,Math.random()*150-75);
    });
  }

  // Infection notice bar
  var bar=document.createElement('div');
  bar.className='infection-notice';
  bar.innerHTML='⚠ infected: <b>'+names[vid]+'</b> ('+codes[vid]+')';
  document.body.appendChild(bar);
  setTimeout(function(){bar.style.transition='opacity 1s';bar.style.opacity='0';},8000);
});
</script>
