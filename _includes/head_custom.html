<!-- Language + TOC + Infection: ALL JS defined here in <head> -->
<script>
// ====== LANGUAGE ======
function kiwikiSetLang(l) {
  try {
    document.body.className = document.body.className.replace(/lang-\w+/g, '') + ' lang-' + l;
    var el = document.getElementById('kiwiki-lang-toggle');
    if (el) {
      var bs = el.getElementsByTagName('button');
      for (var i = 0; i < bs.length; i++) {
        bs[i].className = (bs[i].getAttribute('data-lang') === l) ? 'lang-btn active' : 'lang-btn';
      }
    }
    localStorage.setItem('kiwiki-lang', l);
  } catch(e) {}
  try { setTimeout(kiwikiBuildToc, 100); } catch(e) {}
}

// ====== TOC ======
function kiwikiBuildToc() {
  try {
    var toc = document.getElementById('kiwiki-toc');
    if (!toc) return;
    toc.innerHTML = '';
    var all = document.getElementsByTagName('h2');
    var items = [];
    for (var i = 0; i < all.length; i++) {
      try { if (window.getComputedStyle(all[i]).display === 'none') continue; } catch(e) { continue; }
      items.push(all[i]);
    }
    if (items.length < 2) return;
    var ol = document.createElement('ol');
    ol.style.cssText = 'list-style:none;padding:0;margin:0;';
    for (var j = 0; j < items.length; j++) {
      var h = items[j];
      var num = j + 1;
      if (!h.id) h.id = 'sec-' + num;
      var sn = h.querySelector('.sec-num');
      if (!sn) { sn = document.createElement('span'); sn.className = 'sec-num'; h.insertBefore(sn, h.firstChild); }
      sn.textContent = num + '. ';
      var txt = '';
      for (var c = 0; c < h.childNodes.length; c++) {
        var cn = h.childNodes[c];
        if (cn.nodeType === 1 && (cn.className === 'sec-num' || cn.className === 'anchor-heading')) continue;
        txt += cn.textContent || '';
      }
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = num + '. ' + txt.replace(/#/g, '').trim();
      li.appendChild(a);
      ol.appendChild(li);
    }
    toc.appendChild(ol);
  } catch(e) {}
}

// ====== INIT on DOM ready ======
function kiwikiInit() {
  // Apply saved language
  try {
    var saved = localStorage.getItem('kiwiki-lang') || 'en';
    document.body.className += ' lang-' + saved;
    if (saved !== 'en') {
      var el = document.getElementById('kiwiki-lang-toggle');
      if (el) {
        var bs = el.getElementsByTagName('button');
        for (var i = 0; i < bs.length; i++) {
          bs[i].className = (bs[i].getAttribute('data-lang') === saved) ? 'lang-btn active' : 'lang-btn';
        }
      }
    }
  } catch(e) {
    document.body.className += ' lang-en';
  }

  // Build TOC
  try { kiwikiBuildToc(); } catch(e) {}

  // Infection
  try {
    var viruses = ['echoloop','mirrorlink','pixelrot','deadscroll','glitchmoss','nullwhisper','blindspot','phantomtab','staticbloom','syntaxwraith','cachevein','forgetmenot'];
    var names = {echoloop:'EchoLoop',mirrorlink:'MirrorLink',pixelrot:'PixelRot',deadscroll:'DeadScroll',glitchmoss:'GlitchMoss',nullwhisper:'NullWhisper',blindspot:'BlindSpot',phantomtab:'PhantomTab',staticbloom:'StaticBloom',syntaxwraith:'SyntaxWraith',cachevein:'CacheVein',forgetmenot:'ForgetMeNot'};
    var codes = {echoloop:'WKV-C.SE-001',mirrorlink:'WKV-S.SN-001',pixelrot:'WKV-S.EM-002',deadscroll:'WKV-C.SN-002',glitchmoss:'WKV-E.DA-001',nullwhisper:'WKV-L.MS-001',blindspot:'WKV-S.SE-004',phantomtab:'WKV-L.SN-003',staticbloom:'WKV-E.SN-003',syntaxwraith:'WKV-L.DA-002',cachevein:'WKV-E.MS-002',forgetmenot:'WKV-C.EM-003'};
    var vid = sessionStorage.getItem('kiwiki-virus');
    if (!vid) { vid = viruses[Math.floor(Math.random() * viruses.length)]; sessionStorage.setItem('kiwiki-virus', vid); }
    document.body.className += ' virus-' + vid;
    var bar = document.createElement('div');
    bar.className = 'infection-notice';
    bar.innerHTML = '\u26a0 infected: <b>' + (names[vid]||vid) + '</b> (' + (codes[vid]||'') + ')';
    document.body.appendChild(bar);
    setTimeout(function(){ bar.style.transition='opacity 1s'; bar.style.opacity='0'; }, 8000);
  } catch(e) {}

  // DeadScroll JS effect
  try {
    if (sessionStorage.getItem('kiwiki-virus') === 'deadscroll') {
      var sc = 0;
      window.addEventListener('scroll', function() { if (++sc % 60 === 0) window.scrollBy(0, Math.random()*150-75); });
    }
  } catch(e) {}
}

// Run init when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', kiwikiInit);
} else {
  kiwikiInit();
}
</script>

.infection-notice { position: fixed; bottom: 0; left: 0; right: 0; background: #111; color: lawngreen; font-family: "t26-carbon", monospace; font-style: italic; font-size: 11px; padding: 4px 14px; text-align: center; z-index: 9999; opacity: 0; animation: noticeIn 1s 2s forwards; }
