<!-- Set default language class on body ASAP to prevent flash -->
<script>
(function() {
  var lang = localStorage.getItem('kiwiki-lang') || 'en';
  document.documentElement.className += ' lang-' + lang;
})();
</script>

<!-- Language toggle -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hasLang = document.querySelector('.ko, .en, .ja');
  if (!hasLang) return;

  var t = document.createElement('div');
  t.className = 'lang-toggle';
  t.innerHTML = '<button class="lang-btn" data-lang="en">EN</button>' +
                '<button class="lang-btn" data-lang="ko">한국어</button>' +
                '<button class="lang-btn" data-lang="ja">日本語</button>';

  var mc = document.querySelector('.main-content');
  if (!mc) return;
  mc.insertBefore(t, mc.firstChild);

  var lang = localStorage.getItem('kiwiki-lang') || 'en';
  setLang(lang);

  t.addEventListener('click', function(e) {
    if (e.target.classList.contains('lang-btn')) setLang(e.target.dataset.lang);
  });

  function setLang(l) {
    localStorage.setItem('kiwiki-lang', l);
    // Toggle body class
    document.body.className = document.body.className.replace(/\blang-\w+\b/g, '');
    document.body.classList.add('lang-' + l);
    document.documentElement.className = document.documentElement.className.replace(/\blang-\w+\b/g, '');
    document.documentElement.classList.add('lang-' + l);
    // Update button state
    t.querySelectorAll('.lang-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.lang === l);
    });
  }
});
</script>
