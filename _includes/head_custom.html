<!-- Language: default hide KO/JA, show EN -->
<style>
.ko, .ja { display: none; }
body.lang-ko .ko { display: revert !important; }
body.lang-ko .en, body.lang-ko .ja { display: none !important; }
body.lang-ja .ja { display: revert !important; }
body.lang-ja .ko, body.lang-ja .en { display: none !important; }
body.lang-en .ko, body.lang-en .ja { display: none !important; }
</style>

<!-- Language toggle (separate script, won't break if Typekit fails) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    var saved = localStorage.getItem('kiwiki-lang') || 'en';
    document.body.classList.add('lang-' + saved);

    if (!document.querySelector('.ko') && !document.querySelector('.en') && !document.querySelector('.ja')) return;

    var toggle = document.createElement('div');
    toggle.className = 'lang-toggle';
    ['en', '한국어', '日本語'].forEach(function(label, i) {
      var lang = ['en', 'ko', 'ja'][i];
      var btn = document.createElement('button');
      btn.className = 'lang-btn' + (saved === lang ? ' active' : '');
      btn.setAttribute('data-lang', lang);
      btn.textContent = label;
      toggle.appendChild(btn);
    });

    var mc = document.querySelector('.main-content');
    if (mc) {
      mc.insertBefore(toggle, mc.firstChild);
    }

    toggle.addEventListener('click', function(e) {
      if (!e.target.getAttribute('data-lang')) return;
      var lang = e.target.getAttribute('data-lang');
      document.body.classList.remove('lang-en', 'lang-ko', 'lang-ja');
      document.body.classList.add('lang-' + lang);
      var btns = toggle.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-lang') === lang) {
          btns[i].classList.add('active');
        } else {
          btns[i].classList.remove('active');
        }
      }
      localStorage.setItem('kiwiki-lang', lang);
    });
  } catch(e) {
    console.error('Kiwiki lang toggle error:', e);
  }
});
</script>
