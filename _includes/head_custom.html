<!-- Language default -->
<style>
.ko, .ja { display: none; }
body.lang-ko .ko { display: revert !important; }
body.lang-ko .en, body.lang-ko .ja { display: none !important; }
body.lang-ja .ja { display: revert !important; }
body.lang-ja .ko, body.lang-ja .en { display: none !important; }
body.lang-en .ko, body.lang-en .ja { display: none !important; }

/* === Random virus infection effects === */

/* EchoLoop: text repeats */
body.virus-echoloop .main-content p:nth-child(5n)::after {
  content: attr(data-text);
  display: block;
  opacity: 0.15;
  font-style: italic;
}

/* MirrorLink: everything slightly flipped */
body.virus-mirrorlink .main-content {
  transform: scaleX(-1);
}
body.virus-mirrorlink .main-content * {
  transform: scaleX(-1);
}

/* PixelRot: progressive blur */
body.virus-pixelrot .main-content p {
  filter: blur(0.3px);
}
body.virus-pixelrot .main-content p:nth-child(n+5) {
  filter: blur(0.6px);
}
body.virus-pixelrot .main-content p:nth-child(n+10) {
  filter: blur(1px);
}

/* DeadScroll: scroll position jumps */

/* GlitchMoss: green corruption creeping in */
body.virus-glitchmoss .main-content hr {
  background: lawngreen !important;
  height: 2px;
  animation: mossGrow 4s infinite;
}
@keyframes mossGrow {
  0%,100% { width: 100%; }
  50% { width: 60%; margin-left: 20%; }
}
body.virus-glitchmoss .main-content::after {
  content: "▓▓▓";
  position: fixed;
  bottom: 10px;
  right: 10px;
  color: lawngreen;
  opacity: 0.2;
  font-size: 20px;
  animation: mossSpread 6s infinite;
}
@keyframes mossSpread {
  0%,100% { content: "▓"; opacity: 0.1; }
  33% { content: "▓▓"; opacity: 0.2; }
  66% { content: "▓▓▓▓"; opacity: 0.15; }
}

/* NullWhisper: faint whisper text appears */
body.virus-nullwhisper .main-content::before {
  content: "choose wisely...";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-style: italic;
  font-size: 48px;
  color: orangered;
  opacity: 0;
  pointer-events: none;
  animation: whisper 15s infinite;
}
@keyframes whisper {
  0%,90%,100% { opacity: 0; }
  95% { opacity: 0.04; }
}

/* BlindSpot: random area goes blank */
body.virus-blindspot .main-content p:nth-child(3) {
  color: transparent !important;
  user-select: none;
}
body.virus-blindspot .main-content p:nth-child(3) a {
  color: transparent !important;
}

/* PhantomTab: content duplicates slightly */
body.virus-phantomtab .main-content h2:nth-of-type(3)::after {
  content: attr(data-text);
  position: absolute;
  left: 3px;
  top: 1px;
  opacity: 0.08;
  color: lawngreen;
}

/* StaticBloom: static noise flowers */
body.virus-staticbloom .main-content::after {
  content: "✦";
  position: fixed;
  bottom: 30px;
  left: 30px;
  font-size: 32px;
  color: lawngreen;
  opacity: 0;
  animation: bloom 10s infinite;
  pointer-events: none;
}
@keyframes bloom {
  0%,80%,100% { opacity: 0; transform: scale(0.5); }
  85% { opacity: 0.3; transform: scale(1); }
  90% { opacity: 0.15; transform: scale(1.5); }
}

/* SyntaxWraith: monospace everything */
body.virus-syntaxwraith .main-content p {
  font-family: "t26-carbon", monospace !important;
  font-style: italic;
  letter-spacing: -0.5px;
}

/* CacheVein: vein-like lines */
body.virus-cachevein .main-content {
  background-image:
    linear-gradient(90deg, transparent 98%, rgba(255,69,0,0.03) 100%),
    linear-gradient(0deg, transparent 97%, rgba(255,69,0,0.02) 100%);
  background-size: 40px 40px;
}

/* ForgetMeNot: text fades as you scroll down */
body.virus-forgetmenot .main-content p:nth-child(n+8) {
  opacity: 0.7;
}
body.virus-forgetmenot .main-content p:nth-child(n+12) {
  opacity: 0.4;
}
body.virus-forgetmenot .main-content p:nth-child(n+16) {
  opacity: 0.15;
}

/* Infection notice bar */
.infection-notice {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  color: lawngreen;
  font-family: "t26-carbon", monospace;
  font-style: italic;
  font-size: 11px;
  padding: 4px 14px;
  text-align: center;
  z-index: 9999;
  opacity: 0;
  animation: noticeIn 1s 2s forwards;
}
@keyframes noticeIn {
  to { opacity: 1; }
}
