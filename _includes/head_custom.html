<script>
document.addEventListener('DOMContentLoaded', function() {
  var ko = document.querySelectorAll('.ko');
  var en = document.querySelectorAll('.en');
  var ja = document.querySelectorAll('.ja');
  if (ko.length === 0 && en.length === 0 && ja.length === 0) return;

  var t = document.createElement('div');
  t.className = 'lang-toggle';
  t.innerHTML = '<button class="lang-btn" data-lang="en">EN</button>' +
                '<button class="lang-btn" data-lang="ko">한국어</button>' +
                '<button class="lang-btn" data-lang="ja">日本語</button>';

  var mc = document.querySelector('.main-content');
  if (!mc) return;
  mc.insertBefore(t, mc.firstChild);

  var lang = localStorage.getItem('kiwiki-lang') || 'en';
  set(lang);

  t.addEventListener('click', function(e) {
    if (e.target.classList.contains('lang-btn')) set(e.target.dataset.lang);
  });

  function set(l) {
    localStorage.setItem('kiwiki-lang', l);
    [ko, en, ja].forEach(function(els) {
      els.forEach(function(el) { el.style.display = 'none'; });
    });
    var show = l === 'ko' ? ko : l === 'ja' ? ja : en;
    show.forEach(function(el) { el.style.display = ''; });
    t.querySelectorAll('.lang-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.lang === l);
    });
  }
});
</script>
